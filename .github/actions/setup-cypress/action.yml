# ============================================================================
# Composite Action: Setup Cypress Binary
# ============================================================================
# Cypress ships as an npm wrapper; the Linux runner binary lives in
# ~/.cache/Cypress. setup-bun caches node_modules only, so extension E2E
# needs this step before `bunx cypress run`.
# ============================================================================

name: 'Setup Cypress Binary'
description: 'Cache and install the Cypress test runner binary'

runs:
  using: 'composite'
  steps:
    - name: 📦 Cache Cypress binary
      id: cypress-cache
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ~/.cache/Cypress
        key: ${{ runner.os }}-cypress-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-cypress-

    - name: 🌲 Install Cypress binary
      shell: bash
      run: |
        if [ "${{ steps.cypress-cache.outputs.cache-hit }}" = "true" ]; then
          echo "✅ Cypress cache HIT"
        else
          echo "📦 Downloading Cypress binary…"
        fi
        bunx cypress install
