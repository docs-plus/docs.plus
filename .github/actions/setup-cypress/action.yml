# ============================================================================
# Composite Action: Setup Cypress Binary
# ============================================================================
# Cypress ships as an npm wrapper; the Linux runner binary lives in
# ~/.cache/Cypress. setup-bun caches node_modules only, so extension E2E
# needs this step before `bunx cypress run`.
#
# CRITICAL: the install MUST run from inside an extension workspace, not the
# repo root. `bunx cypress` resolves the locally installed version only when one
# is on the path; the repo root has no `cypress` dep, so bunx fetches
# cypress@latest (e.g. 15.17.0), installs that binary, and even rewrites
# bun.lock — while the suites run the catalog-pinned version (15.15.0) and
# report its binary as missing. From an extension dir bunx resolves the pinned
# version and installs the matching binary. Verified: `bunx cypress --version`
# is 15.17.0 at root vs 15.15.0 from extensions/extension-hyperlink.
# ============================================================================

name: 'Setup Cypress Binary'
description: 'Cache and install the Cypress test runner binary'

runs:
  using: 'composite'
  steps:
    - name: 📦 Cache Cypress binary
      id: cypress-cache
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ~/.cache/Cypress
        key: ${{ runner.os }}-cypress-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-cypress-

    - name: 🌲 Install Cypress binary
      shell: bash
      working-directory: extensions/extension-hyperlink
      run: |
        if [ "${{ steps.cypress-cache.outputs.cache-hit }}" = "true" ]; then
          echo "✅ Cypress cache HIT"
        else
          echo "📦 Downloading Cypress binary…"
        fi
        bunx cypress install
        bunx cypress verify
