# Shared inputs that affect ALL extensions — appended to every key via YAML anchor.
# Keep in sync with build-extensions cache hashFiles (.github/actions/build-extensions).
# Test-only paths (playground, run-tests.sh, setup-cypress) trigger extension-tests
# but do not need a cache bust — dist bytes are unchanged.
_shared: &shared
  - 'package.json'
  - 'bun.lock'
  - 'tsconfig.base.json'
  - '.github/actions/build-extensions/**'
  - 'scripts/publishable-extensions.ts'
  - 'scripts/build-extensions.sh'

extension-indent:
  - *shared
  - 'extensions/extension-indent/**'
extension-hyperlink:
  - *shared
  - 'extensions/extension-hyperlink/**'
extension-hypermultimedia:
  - *shared
  - 'extensions/extension-hypermultimedia/**'
extension-inline-code:
  - *shared
  - 'extensions/extension-inline-code/**'
extension-placeholder:
  - *shared
  - 'extensions/extension-placeholder/**'
any_extension:
  - *shared
  - 'extensions/**'
