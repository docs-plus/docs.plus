name: Quality Lint

# Shared lint/format/style gate for stage and prod pipelines.
on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 🥟 Setup Environment
        uses: ./.github/actions/setup-bun

      - name: 🔍 Lint, format & styles
        run: |
          bun run lint
          bun run format
          bun run lint:styles
