name: docsplus-observability

services:
  loki:
    image: grafana/loki:3.7.3
    container_name: docsplus-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./scripts/observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks: [docsplus-network]
    # No container healthcheck: grafana/loki is a DISTROLESS image (no shell, no wget/curl),
    # so an in-container HTTP probe is impossible. Dependents use `service_started`; Loki is
    # ready in ~300ms and Alloy's loki.write retries until it is. Loki is internal-only.
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 512M } } }

  alloy:
    image: grafana/alloy:v1.17.0
    container_name: docsplus-alloy
    restart: unless-stopped
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    volumes:
      - ./scripts/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    networks: [docsplus-network]
    depends_on: { loki: { condition: service_started } }
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 256M } } }

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: docsplus-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./scripts/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [docsplus-network]
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 512M } } }

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: docsplus-cadvisor
    restart: unless-stopped
    command:
      # Bound cAdvisor CPU on the 4-vCPU box: default 1s cgroup housekeeping across 20+
      # containers can eat 0.5-1 core. Scan at the scrape cadence; drop unused metrics.
      - --docker_only=true
      - --housekeeping_interval=30s
      - --disable_metrics=disk,diskIO,tcp,udp,percpu,sched,process,hugetlb
    # Read-only host mounts + /dev/kmsg, NOT privileged — matches the spec's security
    # model. If cAdvisor won't start on this kernel without privileged, that is a
    # conscious escalation: update docs/observability.md §Security model if you make it.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    networks: [docsplus-network]
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 256M } } }

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: docsplus-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks: [docsplus-network]
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 64M } } }

  grafana:
    image: grafana/grafana:13.1.0
    container_name: docsplus-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: https://grafana.docs.plus
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./scripts/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks: [docsplus-network]
    depends_on:
      loki: { condition: service_started }
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.docs.plus`)'
      - 'traefik.http.routers.grafana.entrypoints=websecure'
      - 'traefik.http.routers.grafana.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.grafana.middlewares=security-headers@file'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 384M } } }

  glitchtip-postgres:
    image: postgres:17.10-alpine3.23
    container_name: docsplus-glitchtip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_POSTGRES_PASSWORD}
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql/data
    networks: [docsplus-network]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U glitchtip -d glitchtip']
      interval: 15s
      timeout: 5s
      retries: 5
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 256M } } }

  glitchtip-redis:
    image: redis:7.4.9-alpine
    container_name: docsplus-glitchtip-redis
    restart: unless-stopped
    # noeviction is correct for a Celery broker (LRU would drop queued tasks); 256mb gives
    # headroom so a bursty error storm doesn't fill the broker and reject event enqueues.
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy noeviction
    networks: [docsplus-network]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 15s
      timeout: 5s
      retries: 5
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 320M } } }

  # One-shot migrate gate. Verified on 6.2.0: web auto-migrates, but the worker's beat
  # scheduler races ahead of migrations on a cold start ("relation uptime_monitor does not
  # exist"). Gating web+worker on this completing makes every fresh deploy clean. Defines
  # the shared env anchor (must be the first GlitchTip service that uses it).
  glitchtip-migrate:
    image: glitchtip/glitchtip:6.2.0
    container_name: docsplus-glitchtip-migrate
    command: ./manage.py migrate --noinput
    restart: 'no'
    environment: &glitchtip-env
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD}@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      PORT: 8080
      GLITCHTIP_DOMAIN: https://glitchtip.docs.plus
      DEFAULT_FROM_EMAIL: alerts@docs.plus
      ENABLE_USER_REGISTRATION: 'false'
      CELERY_WORKER_AUTOSCALE: '1,3'
      GLITCHTIP_MAX_EVENT_LIFE_DAYS: '30' # bound Postgres growth (beat prunes); confirm var name in Step 1b
    depends_on:
      glitchtip-postgres: { condition: service_healthy }
    networks: [docsplus-network]
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }

  glitchtip-web:
    image: glitchtip/glitchtip:6.2.0
    container_name: docsplus-glitchtip-web
    restart: unless-stopped
    environment: *glitchtip-env
    depends_on:
      glitchtip-postgres: { condition: service_healthy }
      glitchtip-redis: { condition: service_healthy }
      glitchtip-migrate: { condition: service_completed_successfully }
    networks: [docsplus-network]
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.glitchtip.rule=Host(`glitchtip.docs.plus`)'
      - 'traefik.http.routers.glitchtip.entrypoints=websecure'
      - 'traefik.http.routers.glitchtip.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.glitchtip.middlewares=security-headers@file'
      - 'traefik.http.services.glitchtip.loadbalancer.server.port=8080'
    healthcheck:
      # The glitchtip image ships NO wget/curl — only python3 (verified). See Step 1b.
      test:
        [
          'CMD',
          'python3',
          '-c',
          'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen("http://localhost:8080/_health/").status==200 else 1)'
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 384M } } }

  glitchtip-worker:
    image: glitchtip/glitchtip:6.2.0
    container_name: docsplus-glitchtip-worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment: *glitchtip-env
    depends_on:
      glitchtip-postgres: { condition: service_healthy }
      glitchtip-redis: { condition: service_healthy }
      glitchtip-migrate: { condition: service_completed_successfully }
    networks: [docsplus-network]
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 384M } } }

  redis-exporter:
    image: oliver006/redis_exporter:v1.73.0
    container_name: docsplus-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://docsplus-redis:6379
    networks: [docsplus-network]
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 32M } } }

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.0
    container_name: docsplus-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${DATABASE_URL}
    networks: [docsplus-network]
    logging: { driver: json-file, options: { max-size: '20m', max-file: '3' } }
    deploy: { resources: { limits: { memory: 48M } } }

volumes:
  loki-data:
  alloy-data:
  prometheus-data:
  grafana-data:
  glitchtip-pg-data:

networks:
  docsplus-network:
    external: true
    name: docsplus-network
