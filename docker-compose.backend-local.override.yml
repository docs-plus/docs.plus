# Override for running backend prod images locally (no Traefik).
# Use: docker compose -f docker-compose.prod.yml -f docker-compose.backend-local.override.yml --env-file .env.local up -d redis rest-api hocuspocus-server hocuspocus-worker
# Then: REST http://localhost:4000  WS ws://localhost:4001  Worker health localhost:4002

name: docsplus

services:
  rest-api:
    env_file: .env.local
    deploy:
      replicas: 1
    ports:
      - '4000:4000'
  hocuspocus-server:
    env_file: .env.local
    deploy:
      replicas: 1
    ports:
      - '4001:4001'
  hocuspocus-worker:
    env_file: .env.local
    deploy:
      replicas: 1
    ports:
      - '4002:4002'

# Prod compose declares docsplus-network as external (for Traefik). For local backend-only runs, create it.
networks:
  docsplus-network:
    external: false
    name: docsplus-network
