apiVersion: 1
groups:
  - orgId: 1
    name: incident-metrics
    folder: docs.plus
    interval: 1m
    rules:
      - uid: incident-oom-risk
        title: Container memory near limit (OOM risk)
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: 'Container {{ $labels.name }} is using >90% of its cgroup memory limit for 5m (OOM risk)'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (name) (container_memory_working_set_bytes{name!=""} / clamp_min(container_spec_memory_limit_bytes{name!=""}, 1))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.9] }
              refId: C

      - uid: incident-crash-loop
        title: Container crash loop (restarts increasing)
        condition: C
        for: 0s
        # OK, not Alerting: `changes(...) > 2` returns NO series on a healthy host
        # (nothing restarted >2x) -> NoData. A dead cadvisor is caught by
        # infra-target-down-telemetry instead, so this can't go silently blind.
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A container restarted in the last 15m (crash loop)
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (name) (changes(container_start_time_seconds{name!=""}[15m]) > 2)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: dep-redis-evictions
        title: Redis evicting keys (volatile-lru active)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Redis is evicting TTL'd keys — claim-check document states are in the eviction set (payload-less DLQ risk)
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'increase(redis_evicted_keys_total[15m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: dep-redis-maxmemory
        title: Redis near maxmemory (>90%)
        condition: C
        for: 5m
        # OK, not Alerting: the `(redis_memory_max_bytes > 0)` guard empties the
        # expression when maxmemory is unset -> NoData. A dead redis-exporter is
        # caught by infra-target-down (critical).
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Redis memory usage exceeds 90% of maxmemory limit
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'redis_memory_used_bytes / (redis_memory_max_bytes > 0)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.9] }
              refId: C

      - uid: dep-traefik-5xx
        title: Traefik 5xx surge
        condition: C
        for: 5m
        # OK, not Alerting: sum over zero 5xx series is empty -> NoData on a quiet
        # system. A dead traefik is caught by infra-target-down (critical).
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Traefik 5xx error rate exceeds 1 req/s for 5m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'sum(rate(traefik_service_requests_total{code=~"5.."}[5m]))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [1] }
              refId: C

  - orgId: 1
    name: infra-meta
    folder: docs.plus
    interval: 1m
    rules:
      - uid: infra-target-down
        title: Core scrape target down (up==0)
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A core scrape target is down (up==0)
          runbook_url: 'Restart the affected service (docker compose restart <svc>); check the host and scrape config.'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'up{job=~"rest-api|hocuspocus-server|hocuspocus-worker|postgres-exporter|redis-exporter|traefik"}'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      - uid: infra-target-down-telemetry
        title: Telemetry scrape target down (up==0)
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: A telemetry target (cadvisor/node-exporter) is down for 5m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'up{job=~"cadvisor|node-exporter"}'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      - uid: infra-disk-space
        title: Filesystem free space low (<10%)
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Filesystem available space below 10% for 5m
          runbook_url: 'Clean docker logs / loki chunks; check the postgres data dir.'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'min by (instance, mountpoint) (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [0.10] }
              refId: C

      - uid: infra-host-memory
        title: Host available memory low (<10%)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Host available memory below 10% for 5m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [0.10] }
              refId: C
