apiVersion: 1
groups:
  - orgId: 1
    name: worker
    folder: docs.plus
    interval: 1m
    rules:
      - uid: worker-queue-backlog
        title: store-documents queue backlog (>100 waiting)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: store-documents queue backlog >100 waiting for 10m (edit-persistence stall / data-loss risk). Tune after baseline.
          runbook_url: 'Restart/drain hocuspocus-worker; check redis + postgres.'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (queue) (queue_jobs{queue="store-documents",state="waiting"})'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [100] }
              refId: C

      - uid: worker-job-failures
        title: store-documents job failures (>5 in 10m)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: More than 5 store-documents jobs failed in the last 10m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'sum by (queue) (increase(jobs_total{queue="store-documents",status="failed"}[10m]))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [5] }
              refId: C

      - uid: worker-notification-job-failures
        title: Notification job failures (>3 in 10m)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: More than 3 email/push notification jobs failed in the last 10m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'sum by (queue) (increase(jobs_total{queue=~"email-notifications|push-notifications",status="failed"}[10m]))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [3] }
              refId: C

      - uid: worker-dlq-depth
        title: Dead-letter queue not empty
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: 'DLQ {{ $labels.queue }} holds jobs that exhausted retries; inspect and requeue or discard.'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              # DLQ queues have no worker, so parked jobs sit in waiting/delayed/prioritized.
              expr: 'sum by (queue) (queue_jobs{queue=~".*-dlq",state=~"waiting|delayed|prioritized"})'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: worker-media-usage-high
        title: Workspace media usage high (>90%)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: A workspace is above 90% of its media storage quota
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'media_workspace_max_usage_percent'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [90] }
              refId: C
