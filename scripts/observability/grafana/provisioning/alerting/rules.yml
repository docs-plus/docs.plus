apiVersion: 1
groups:
  - orgId: 1
    name: incident-logs
    folder: docs.plus
    interval: 1m
    rules:
      - uid: incident-failed-migration
        title: Failed migration (Prisma P3009)
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Prisma migration error P3009 seen in rest-api/hocuspocus logs
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: 'count_over_time({service=~"rest-api|hocuspocus.+"} |= "P3009" [10m])'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: incident-upload-drift
        title: Upload/config drift (PayloadTooLarge)
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: PayloadTooLargeError or "exceeds maximum 0.00MB" in logs (upload size misconfig)
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: 'count_over_time({service=~".+"} |~ "PayloadTooLargeError|exceeds maximum 0.00MB" [10m])'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: incident-error-surge
        title: Error surge (level=50 rate)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Sustained error-log rate above 5/s (level=50); tune threshold after baseline
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: 'sum(rate({level="50"} [5m]))'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [5] }
              refId: C

      - uid: incident-email-broken
        title: Email broken (SMTP 535/EAUTH)
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: SMTP auth failure (535 / EAUTH) in hocuspocus logs
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: 'count_over_time({service=~"hocuspocus.+"} |~ "535|EAUTH" [10m])'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

  - orgId: 1
    name: incident-metrics
    folder: docs.plus
    interval: 1m
    rules:
      - uid: incident-oom-risk
        title: Container memory near limit (OOM risk)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A container is using >90% of its memory limit for 5m (OOM risk)
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (name) (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""} > 0)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.9] }
              refId: C

      - uid: incident-crash-loop
        title: Container crash loop (restarts increasing)
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A container restarted in the last 15m (crash loop)
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (name) (changes(container_start_time_seconds{name!=""}[15m]) > 0)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: dep-redis-maxmemory
        title: Redis near maxmemory (>90%)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Redis memory usage exceeds 90% of maxmemory limit
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'redis_memory_used_bytes / (redis_memory_max_bytes > 0)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.9] }
              refId: C

      - uid: dep-traefik-5xx
        title: Traefik 5xx surge
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Traefik 5xx error rate exceeds 1 req/s for 5m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'sum(rate(traefik_service_requests_total{code=~"5.."}[5m]))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [1] }
              refId: C
