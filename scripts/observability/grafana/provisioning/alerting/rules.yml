apiVersion: 1
groups:
  - orgId: 1
    name: incident-logs
    folder: docs.plus
    interval: 1m
    rules:
      - uid: incident-failed-migration
        title: Failed migration (Prisma P3009)
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Prisma migration error P3009 seen in rest-api/hocuspocus logs
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: 'count_over_time({service=~"rest-api|hocuspocus.+"} |= "P3009" [10m])'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: incident-upload-drift
        title: Upload/config drift (PayloadTooLarge)
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: PayloadTooLargeError or "exceeds maximum 0.00MB" in logs (upload size misconfig)
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              # Scope to upload-handling app services only. A bare {service=~".+"}
              # self-fires: Grafana/Loki log this very query, Alloy re-ingests it,
              # and the rule then matches its own "PayloadTooLargeError" footprint.
              expr: 'count_over_time({service=~"rest-api|hocuspocus.+|webapp"} |~ "PayloadTooLargeError|exceeds maximum 0.00MB" [10m])'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: incident-error-surge
        title: Error surge (level=50 rate)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Sustained error-log rate above 5/s (level=50); tune threshold after baseline
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: 'sum(rate({service=~"rest-api|hocuspocus.+|webapp", level="50"} [5m]))'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [5] }
              refId: C

      - uid: incident-email-broken
        title: Email broken (SMTP 535/EAUTH)
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: SMTP auth failure (535 / EAUTH) in hocuspocus logs
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: 'count_over_time({service=~"hocuspocus.+"} |~ "Error: 535|EAUTH" [10m])'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

  - orgId: 1
    name: incident-metrics
    folder: docs.plus
    interval: 1m
    rules:
      - uid: incident-oom-risk
        title: Container memory near limit (OOM risk)
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A container is using >90% of its memory limit for 5m (OOM risk)
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (name) (container_memory_usage_bytes{name!=""} / (container_spec_memory_limit_bytes{name!=""} > 0))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.9] }
              refId: C

      - uid: incident-crash-loop
        title: Container crash loop (restarts increasing)
        condition: C
        for: 0s
        # OK, not Alerting: `changes(...) > 2` returns NO series on a healthy host
        # (nothing restarted >2x) -> NoData. A dead cadvisor is caught by
        # infra-target-down-telemetry instead, so this can't go silently blind.
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A container restarted in the last 15m (crash loop)
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (name) (changes(container_start_time_seconds{name!=""}[15m]) > 2)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: dep-redis-maxmemory
        title: Redis near maxmemory (>90%)
        condition: C
        for: 5m
        # OK, not Alerting: the `(redis_memory_max_bytes > 0)` guard empties the
        # expression when maxmemory is unset -> NoData. A dead redis-exporter is
        # caught by infra-target-down (critical).
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Redis memory usage exceeds 90% of maxmemory limit
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'redis_memory_used_bytes / (redis_memory_max_bytes > 0)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.9] }
              refId: C

      - uid: dep-traefik-5xx
        title: Traefik 5xx surge
        condition: C
        for: 5m
        # OK, not Alerting: sum over zero 5xx series is empty -> NoData on a quiet
        # system. A dead traefik is caught by infra-target-down (critical).
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Traefik 5xx error rate exceeds 1 req/s for 5m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'sum(rate(traefik_service_requests_total{code=~"5.."}[5m]))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [1] }
              refId: C

  - orgId: 1
    name: slo-app
    folder: docs.plus
    interval: 1m
    rules:
      - uid: slo-http-5xx-ratio
        title: HTTP 5xx ratio per service (>5%)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Per-service HTTP 5xx ratio >5% for 10m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'sum by (job) (rate(http_requests_total{job=~"rest-api|hocuspocus-server",status=~"5.."}[5m])) / sum by (job) (rate(http_requests_total{job=~"rest-api|hocuspocus-server"}[5m]))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.05] }
              refId: C

      - uid: slo-latency-p95-app
        title: App request p95 latency (>1s)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: App HTTP request p95 latency above 1s for 10m; tune after baseline
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'histogram_quantile(0.95, sum by (le, job) (rate(http_request_duration_seconds_bucket{job=~"rest-api|hocuspocus-server"}[5m])))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [1] }
              refId: C

      - uid: slo-latency-p95-edge
        title: Edge (Traefik) p95 latency (>1.5s)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Traefik service p95 latency above 1.5s for 10m; tune after baseline
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              # WS connection lifetime is counted as request duration; exclude those
              # services so a single long-lived socket doesn't pin edge p95 at the cap.
              expr: 'histogram_quantile(0.95, sum by (le) (rate(traefik_service_request_duration_seconds_bucket{service!~".*websocket.*|hocuspocus.*"}[5m])))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [1.5] }
              refId: C

      - uid: slo-eventloop-lag
        title: Node.js event-loop p99 lag (>100ms)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Node.js event-loop p99 lag above 100ms for 5m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (job) (nodejs_eventloop_lag_p99_seconds{job=~"rest-api|hocuspocus-server|hocuspocus-worker"})'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.1] }
              refId: C

  - orgId: 1
    name: infra-meta
    folder: docs.plus
    interval: 1m
    rules:
      - uid: infra-target-down
        title: Core scrape target down (up==0)
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A core scrape target is down (up==0)
          runbook_url: 'Restart the affected service (docker compose restart <svc>); check the host and scrape config.'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'up{job=~"rest-api|hocuspocus-server|hocuspocus-worker|postgres-exporter|redis-exporter|traefik"}'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      - uid: infra-target-down-telemetry
        title: Telemetry scrape target down (up==0)
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: A telemetry target (cadvisor/node-exporter) is down for 5m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'up{job=~"cadvisor|node-exporter"}'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      - uid: infra-disk-space
        title: Filesystem free space low (<10%)
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Filesystem available space below 10% for 5m
          runbook_url: 'Clean docker logs / loki chunks; check the postgres data dir.'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'min by (instance, mountpoint) (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [0.10] }
              refId: C

      - uid: infra-host-memory
        title: Host available memory low (<10%)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Host available memory below 10% for 5m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [0.10] }
              refId: C

  - orgId: 1
    name: deps-extended
    folder: docs.plus
    interval: 1m
    rules:
      - uid: dep-postgres-down
        title: Postgres down (pg_up==0)
        condition: C
        for: 1m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Postgres is down (pg_up==0)
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'pg_up'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      - uid: dep-postgres-conn-saturation
        title: Postgres connection saturation (>80%)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Postgres connections above 80% of max_connections for 5m; tune after baseline
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              # max() collapses the RHS to one labelless series so on() can never hit
              # a many-to-one error if a second pg exporter ever appears.
              expr: 'sum(pg_stat_activity_count) / on() max(pg_settings_max_connections)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.8] }
              refId: C

      - uid: dep-tls-cert-expiry
        title: TLS certificate expiring (<14d)
        condition: C
        for: 1h
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: A TLS certificate expires within 14 days
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              # 1209600 = 14 days in seconds.
              expr: 'min(traefik_tls_certs_not_after) - time()'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1209600] }
              refId: C

  - orgId: 1
    name: worker
    folder: docs.plus
    interval: 1m
    rules:
      - uid: worker-queue-backlog
        title: store-documents queue backlog (>100 waiting)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: store-documents queue backlog >100 waiting for 10m (edit-persistence stall / data-loss risk). Tune after baseline.
          runbook_url: 'Restart/drain hocuspocus-worker; check redis + postgres.'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'max by (queue) (queue_jobs{queue="store-documents",state="waiting"})'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [100] }
              refId: C

      - uid: worker-job-failures
        title: store-documents job failures (>5 in 10m)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: More than 5 store-documents jobs failed in the last 10m
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'sum by (queue) (increase(jobs_total{queue="store-documents",status="failed"}[10m]))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [5] }
              refId: C

  - orgId: 1
    name: realtime
    folder: docs.plus
    interval: 1m
    rules:
      - uid: realtime-ws-auth-rejection
        title: WS auth rejections elevated
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Majority of WS connections auth-rejected (reconnect storm / token-verify failure)
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              # Ratio, not absolute rate: a small baseline of expired tabs stays quiet,
              # but a connect->reject->reconnect storm pushes rejected/connections high.
              # clamp_min avoids divide-by-zero when the socket pool is idle.
              expr: 'sum(rate(ws_auth_rejections_total[5m])) / clamp_min(sum(rate(ws_connections_total[5m])), 1)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.5] }
              refId: C

      - uid: realtime-doc-persist-slow
        title: Document persist enqueue p99 slow (>0.5s)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: store-hook enqueue overhead p99 >0.5s (blocks WS event loop). Actual DB write latency is covered by worker rules.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'histogram_quantile(0.99, sum by (le) (rate(document_persist_duration_seconds_bucket[5m])))'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.5] }
              refId: C

      - uid: realtime-ws-mass-drop
        title: WS connections mass-drop (halved vs 5m ago)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: 'WS connections halved vs 5m ago. LOWER-CONFIDENCE: tune the >20 floor and 0.5 ratio after baselining concurrency.'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: '(ws_active_connections offset 5m > 20) and (ws_active_connections < ws_active_connections offset 5m * 0.5)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

  - orgId: 1
    name: pipeline-liveness
    folder: docs.plus
    interval: 1m
    rules:
      - uid: pipeline-loki-liveness
        title: No app logs ingested (Loki/Alloy pipeline)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: No app logs ingested for ~15m — Loki/Alloy pipeline may be down (the log alerts fail green otherwise).
        data:
          - refId: A
            queryType: instant
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              # traefik + hocuspocus log continuously in prod; rest-api/webapp are too
              # quiet and age out, so scoping to the always-on services avoids false fires.
              expr: 'absent_over_time({service=~"traefik|hocuspocus.+"}[15m])'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C

      - uid: ops-deadman
        title: Deadman heartbeat
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: info
          deadman: 'true'
        annotations:
          summary: Deadman heartbeat. If this STOPS reaching the external snitch, the alert pipeline is down.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'vector(1)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
              refId: C
