apiVersion: 1
groups:
  - orgId: 1
    name: deps-extended
    folder: docs.plus
    interval: 1m
    rules:
      - uid: dep-postgres-down
        title: Postgres down (pg_up==0)
        condition: C
        for: 1m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Postgres is down (pg_up==0)
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 'pg_up'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      - uid: dep-postgres-conn-saturation
        title: Postgres connection saturation (>80%)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Postgres connections above 80% of max_connections for 5m; tune after baseline
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              # max() collapses the RHS to one labelless series so on() can never hit
              # a many-to-one error if a second pg exporter ever appears.
              expr: 'sum(pg_stat_activity_count) / on() max(pg_settings_max_connections)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.8] }
              refId: C

      - uid: dep-tls-cert-expiry
        title: TLS certificate expiring (<14d)
        condition: C
        for: 1h
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: A TLS certificate expires within 14 days
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              # 1209600 = 14 days in seconds.
              expr: 'min(traefik_tls_certs_not_after) - time()'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1209600] }
              refId: C
