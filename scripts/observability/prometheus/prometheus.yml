global:
  scrape_interval: 30s
  evaluation_interval: 30s
scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082']
  - job_name: rest-api
    metrics_path: /metrics
    static_configs:
      - targets: ['rest-api:4000']
  - job_name: hocuspocus-server
    metrics_path: /metrics
    static_configs:
      - targets: ['hocuspocus-server:4003']
  - job_name: hocuspocus-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['hocuspocus-worker:4002']
