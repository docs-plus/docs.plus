global:
  scrape_interval: 30s
  evaluation_interval: 30s
scrape_configs:
  - job_name: cadvisor
    # Infra metrics — dashboards/alerts use 5m rates; 60s cuts ingest without losing signal.
    scrape_interval: 60s
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # 2.2k+ unused series on prod (advance TCP per-state labels); biggest TSDB head cost.
      - source_labels: [__name__]
        regex: container_network_advance_tcp_stats_total
        action: drop
      - source_labels: [__name__]
        regex: container_(tasks_state|memory_failures_total)
        action: drop
      # Compose path/hash labels bloat the TSDB index; queries use `name` only.
      - regex: container_label_.+
        action: labeldrop
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082']
  - job_name: rest-api
    metrics_path: /metrics
    static_configs:
      - targets: ['rest-api:4000']
  - job_name: hocuspocus-server
    metrics_path: /metrics
    static_configs:
      - targets: ['hocuspocus-server:4003']
  - job_name: hocuspocus-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['hocuspocus-worker:4002']
  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://docs.plus
          - https://docs.plus/sw.js
          - https://prodback.docs.plus/health
          - https://prodback.docs.plus/health/supabase
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
